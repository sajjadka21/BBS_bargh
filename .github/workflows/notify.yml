name: Khamooshi Notifier

on:
  schedule:
    # Runs at 03:30 and 10:30 UTC = 07:00 and 14:00 Iran time (UTC+3:30)
    - cron: "30 3,10 * * *"
  workflow_dispatch: {}   # allows manual "Run workflow" button for testing

permissions:
  contents: write   # needed so the workflow can commit the updated state.json back

jobs:
  check-outages:
    runs-on: [self-hosted, Windows]
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run notifier
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python khamooshi_notify.py

      - name: Commit updated state files (if changed)
        shell: bash
        run: |
          git config user.name "khamooshi-bot"
          git config user.email "actions@github.com"
          git add offset.json state_*.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Update outage state [skip ci]"
          git push
