name: Fetch outage snapshots

on:
  schedule:
    # Iran local time: 00:30
    - cron: "30 0 * * *"
      timezone: "Asia/Tehran"

    # Iran local time: 06:00, 12:00, 18:00
    - cron: "0 6,12,18 * * *"
      timezone: "Asia/Tehran"

  workflow_dispatch: {}

concurrency:
  group: outage-fetcher
  cancel-in-progress: false

jobs:
  fetch-and-sync:
    runs-on: [self-hosted, Windows]
    timeout-minutes: 15

    defaults:
      run:
        shell: cmd

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          architecture: "x64"

      - name: Check Python
        run: |
          where python
          python --version
          python -m pip --version

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Fetch and synchronize outages
        env:
          WORKER_SYNC_URL: ${{ secrets.WORKER_SYNC_URL }}
          WORKER_SYNC_SECRET: ${{ secrets.WORKER_SYNC_SECRET }}
        run: python khamooshi_notify.py