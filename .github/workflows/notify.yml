name: Fetch outage snapshots

on:
  schedule:
    # Iran local time: 00:30
    - cron: "30 0 * * *"
      timezone: "Asia/Tehran"

    # Iran local time: 06:00, 12:00, 18:00
    - cron: "0 6,12,18 * * *"
      timezone: "Asia/Tehran"

  workflow_dispatch: {}

concurrency:
  group: outage-fetcher
  cancel-in-progress: false

jobs:
  fetch-and-sync:
    runs-on: [self-hosted, Windows]
    timeout-minutes: 15

    defaults:
      run:
        shell: cmd

    env:
      PYTHON_EXE: C:\Users\sajjad.ka21\AppData\Local\Programs\Python\Python310\python.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Python
        run: |
          if not exist "%PYTHON_EXE%" (echo Python not found at %PYTHON_EXE% & exit /b 1)
          "%PYTHON_EXE%" --version
          "%PYTHON_EXE%" -m pip --version

      - name: Install dependencies
        run: |
          "%PYTHON_EXE%" -m pip install --disable-pip-version-check -r requirements.txt

      - name: Fetch and synchronize outages
        env:
          WORKER_SYNC_URL: ${{ secrets.WORKER_SYNC_URL }}
          WORKER_SYNC_SECRET: ${{ secrets.WORKER_SYNC_SECRET }}
        run: |
          "%PYTHON_EXE%" khamooshi_notify.py