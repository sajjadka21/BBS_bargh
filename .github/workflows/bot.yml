name: Khamooshi Bot (buttons/search)

on:
  schedule:
    # Every 5 minutes -- GitHub's practical minimum for scheduled workflows.
    # This is what "always on" gets simulated as, without a personal machine.
    - cron: "*/5 * * * *"
  workflow_dispatch: {}   # lets you trigger it manually to test right away

permissions:
  contents: write   # needed so it can commit offset.json / pending_search.json back

concurrency:
  group: khamooshi-bot
  cancel-in-progress: false   # never cancel a run mid-way (would lose an update)

jobs:
  handle-buttons:
    runs-on: ubuntu-latest   # a normal GitHub-hosted runner -- outside Iran, no proxy needed
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Process one bot cycle
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # No TELEGRAM_PROXY here on purpose -- hosted runners reach
          # Telegram directly.
        run: python khamooshi_bot_once.py

      - name: Commit updated bot state (if changed)
        shell: bash
        run: |
          git config user.name "khamooshi-bot"
          git config user.email "actions@github.com"
          git pull --rebase --quiet || true
          git add offset.json pending_search.json
          git diff --cached --quiet || git commit -m "Update bot state [skip ci]"
          git push
