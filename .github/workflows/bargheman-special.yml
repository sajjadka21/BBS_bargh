name: Fetch Bargheman special outages

on:
  schedule:
    - cron: "30 0 * * *"
      timezone: "Asia/Tehran"

    - cron: "0 6,12,18 * * *"
      timezone: "Asia/Tehran"

  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: bargheman-special-fetch
  cancel-in-progress: false

jobs:
  fetch-special-outages:
    runs-on: [self-hosted, Windows]
    timeout-minutes: 15

    defaults:
      run:
        shell: cmd

    env:
      PYTHON_EXE: C:\Users\sajjad.ka21\AppData\Local\Programs\Python\Python310\python.exe

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check Python
        run: |
          if not exist "%PYTHON_EXE%" (echo Python not found at %PYTHON_EXE% & exit /b 1)
          "%PYTHON_EXE%" --version
          "%PYTHON_EXE%" -m pip --version

      - name: Install runtime dependencies
        run: |
          "%PYTHON_EXE%" -m pip install --disable-pip-version-check requests jdatetime tzdata

      - name: Fetch and synchronize approved bills
        env:
          WORKER_SYNC_URL: ${{ secrets.WORKER_SYNC_URL }}
          WORKER_SYNC_SECRET: ${{ secrets.WORKER_SYNC_SECRET }}
          BARGHEMAN_AUTHORIZATION: ${{ secrets.BARGHEMAN_AUTHORIZATION }}
          BARGHEMAN_PLANNED_TEMPLATE: ${{ secrets.BARGHEMAN_PLANNED_TEMPLATE }}
        run: |
          "%PYTHON_EXE%" bargheman_special_fetch.py
